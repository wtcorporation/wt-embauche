<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="margin-bottom:14px;border:1.6px dashed #d5d1c8;border-radius:14px;padding:15px 16px;background:#fbfaf7">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:2px">
    <span style="font-size:18px;line-height:1">📎</span>
    <span style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:#2b2e34;flex:1">{{ title }}</span>
    <span style="font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;color:#9a968d">{{ optionLabel }}</span>
  </div>
  <p style="margin:0 0 12px;font-size:13px;color:#6b6f77;line-height:1.45">{{ hint }}</p>
  <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;background:#fff;border:1.6px solid var(--accent,#d9682f);color:var(--accent,#d9682f);font-family:'Figtree',sans-serif;font-weight:700;font-size:14.5px;padding:10px 16px;border-radius:11px" style-hover="display:inline-flex;align-items:center;gap:8px;cursor:pointer;background:var(--accent-soft,#fdeadd);border:1.6px solid var(--accent,#d9682f);color:var(--accent,#d9682f);font-family:'Figtree',sans-serif;font-weight:700;font-size:14.5px;padding:10px 16px;border-radius:11px">
    <span style="font-size:16px;line-height:1">＋</span> Ajouter un fichier
    <input type="file" data-slot="{{ slot }}" accept=".pdf,.jpg,.jpeg,.png,.heic,image/*,application/pdf" multiple="{{ multiple }}" onChange="{{ onFile }}" style="display:none;width:auto" />
  </label>
  <sc-if value="{{ error }}" hint-placeholder-val="">
    <p style="margin:11px 0 0;font-size:13.5px;color:#c0392b;display:flex;align-items:center;gap:6px"><span style="font-weight:700">!</span> {{ error }}</p>
  </sc-if>
  <sc-for list="{{ files }}" as="ff" hint-placeholder-count="0">
    <div style="display:flex;align-items:center;gap:10px;margin-top:10px;background:#eef6f0;border:1px solid #cfe6d8;border-radius:10px;padding:9px 12px">
      <span style="color:#2f8f5b;font-weight:800;line-height:1">✓</span>
      <span style="flex:1;font-size:14px;color:#2b2e34;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ ff.name }}</span>
      <span style="font-size:12.5px;color:#7a7e86;white-space:nowrap">{{ ff.sizeStr }}</span>
      <button type="button" data-slot="{{ slot }}" data-idx="{{ ff.idx }}" onClick="{{ onRemove }}" aria-label="Retirer" style="border:none;background:none;color:#b23b32;font-size:20px;line-height:1;cursor:pointer;padding:0 2px;width:auto">×</button>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;420px&quot;,&quot;height&quot;:&quot;180px&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Permis de conduire — recto&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hint&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;PDF, JPG, PNG ou HEIC · une photo claire suffit&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;optionLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Facultatif&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;slot&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;multiple&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;files&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&lt;{name:string,sizeStr:string,idx:number}&gt;&quot;},&quot;error&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onFile&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(e:any)=&gt;void&quot;},&quot;onRemove&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(e:any)=&gt;void&quot;}}"></script>
</body>
</html>
